<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="shield-left-grad" x1="16" y1="2" x2="6" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#3b82f6" />
      <stop offset="100%" stopColor="#1d4ed8" />
    </linearGradient>
    <linearGradient id="shield-right-grad" x1="16" y1="2" x2="26" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#64748b" />
      <stop offset="100%" stopColor="#334155" />
    </linearGradient>
  </defs>

  <!-- Left Shield Half -->
  <path d="M16 2.5 L6.5 6.5 V15 C6.5 21 12 26 16 29" stroke="url(#shield-left-grad)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
  
  <!-- Right Shield Half -->
  <path d="M16 2.5 L25.5 6.5 V15 C25.5 21 20 26 16 29" stroke="url(#shield-right-grad)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />

  <!-- Monogram L -->
  <path d="M11 9 V22 H15" stroke="url(#shield-left-grad)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
  
  <!-- Monogram C -->
  <path d="M21 9 H18.5 C16.5 9 16.5 22 18.5 22 H21" stroke="url(#shield-right-grad)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />

  <!-- Central Column of Scales -->
  <path d="M16 8 V24" stroke="url(#shield-right-grad)" strokeWidth="1.5" strokeLinecap="round" />
  <!-- Stand base -->
  <path d="M14 24 H18" stroke="url(#shield-right-grad)" strokeWidth="2" strokeLinecap="round" />

  <!-- Scales Crossbar -->
  <path d="M10 11 H22" stroke="url(#shield-right-grad)" strokeWidth="1.5" strokeLinecap="round" />

  <!-- Left Cup Suspension Strings -->
  <path d="M10 11 L8 17 M10 11 L12 17" stroke="url(#shield-left-grad)" strokeWidth="1" />
  <!-- Left Cup -->
  <path d="M7.5 17 H12.5 C12.5 19.5 7.5 19.5 7.5 17 Z" fill="url(#shield-left-grad)" />

  <!-- Right Cup Suspension Strings -->
  <path d="M22 11 L20 17 M22 11 L24 17" stroke="url(#shield-right-grad)" strokeWidth="1" />
  <!-- Right Cup -->
  <path d="M19.5 17 H24.5 C24.5 19.5 19.5 19.5 19.5 17 Z" fill="url(#shield-right-grad)" />
</svg>